name: Build & Release APK

# Triggered when a version tag (e.g. v0.1, v1.2.3) is pushed.
# Builds a debug APK (signed with the Android debug key) – no secrets required.

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build APK and create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK with version tag
        run: |
          VERSION=${GITHUB_REF_NAME}
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/eink-dashboard-${VERSION}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "eink-dashboard ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: app/build/outputs/apk/debug/eink-dashboard-${{ github.ref_name }}.apk
