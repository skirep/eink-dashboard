name: Build & Release APK

# Triggered when a version tag (e.g. v0.1, v1.2.3) is pushed.
# Required GitHub Secrets for signed release builds:
#   KEYSTORE_BASE64   – Base64-encoded .jks / .keystore file
#   KEYSTORE_PASSWORD – Keystore password
#   KEY_ALIAS         – Key alias inside the keystore
#   KEY_PASSWORD      – Key password
# Generate a keystore: keytool -genkey -v -keystore release.jks -keyalg RSA -keysize 2048 -validity 10000 -alias release
# Encode it:           base64 -w 0 release.jks > release.jks.b64  (then paste the contents as KEYSTORE_BASE64 secret)

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build APK and create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > $RUNNER_TEMP/release.jks
            echo "KEYSTORE_FILE=$RUNNER_TEMP/release.jks" >> $GITHUB_ENV
          fi

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APK with version tag
        run: |
          VERSION=${GITHUB_REF_NAME}
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/eink-dashboard-${VERSION}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "eink-dashboard ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: app/build/outputs/apk/release/eink-dashboard-${{ github.ref_name }}.apk
